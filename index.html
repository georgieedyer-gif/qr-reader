<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QR Reader</title>

<!-- PWA / iPhone home screen -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="QR Reader">
<meta name="theme-color" content="#f7f5f0">

<!-- Apple touch icon (shown on home screen) -->
<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --ink: #1a1a18;
    --ink-muted: #888880;
    --accent: #2d5a27;
    --accent-light: #eef3ed;
    --border: #e2e0da;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(40px + var(--safe-top)) 20px calc(20px + var(--safe-bottom));
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1;
  }

  header p {
    margin-top: 8px;
    font-size: 0.72rem;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.05);
  }

  .camera-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    background: #111;
    overflow: hidden;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .scan-frame {
    width: 55%;
    aspect-ratio: 1;
    position: relative;
  }

  .scan-frame::before, .scan-frame::after,
  .scan-frame > span::before, .scan-frame > span::after {
    content: '';
    position: absolute;
    width: 22px;
    height: 22px;
    border-color: rgba(255,255,255,0.9);
    border-style: solid;
  }
  .scan-frame::before  { top: 0; left: 0;  border-width: 2px 0 0 2px; }
  .scan-frame::after   { top: 0; right: 0; border-width: 2px 2px 0 0; }
  .scan-frame > span::before { bottom: 0; left: 0;  border-width: 0 0 2px 2px; }
  .scan-frame > span::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

  .scan-line {
    position: absolute;
    left: 8%; width: 84%; height: 1.5px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    animation: scanMove 2s ease-in-out infinite;
    top: 0;
  }

  @keyframes scanMove {
    0%   { top: 8%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 92%; opacity: 0; }
  }

  .status-bar {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    color: var(--ink-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    min-height: 44px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink-muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.active  { background: var(--accent); animation: pulse 1.5s ease-in-out infinite; }
  .dot.success { background: var(--accent); animation: none; }
  .dot.error   { background: #c0392b; animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .result-panel {
    border-top: 1px solid var(--border);
    padding: 24px;
    display: none;
    animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .result-panel.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 12px;
  }

  .result-text {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    line-height: 1.45;
    color: var(--ink);
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    padding: 16px 18px;
    border-radius: 0 10px 10px 0;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .result-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  button {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    padding: 12px 18px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .btn-copy {
    background: var(--accent);
    color: #fff;
    flex: 1;
  }
  .btn-copy:active { background: #24491f; transform: scale(0.97); }

  .btn-scan-again {
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--border);
    flex: 1;
  }
  .btn-scan-again:active { background: var(--border); }

  .start-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,10,8,0.72);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .start-icon {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .start-icon svg { width: 24px; height: 24px; fill: white; }

  .start-label {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
  }

  .copied-toast {
    position: fixed;
    bottom: calc(30px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #fff;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 100px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .copied-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* iOS install prompt */
  .install-tip {
    margin-top: 24px;
    max-width: 420px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    font-size: 0.72rem;
    color: var(--ink-muted);
    letter-spacing: 0.04em;
    line-height: 1.8;
    display: none;
  }
  .install-tip strong { color: var(--ink); }
  .install-tip .close-tip {
    float: right;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    color: var(--ink-muted);
    background: none;
    border: none;
    padding: 0;
    margin: 0;
  }

  canvas { display: none; }
</style>
</head>
<body>

<header>
  <h1>QR Reader</h1>
  <p>Text reveals here — never leaves your device</p>
</header>

<div class="card">
  <div class="camera-wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>

    <div class="scan-overlay">
      <div class="scan-frame">
        <span></span>
        <div class="scan-line"></div>
      </div>
    </div>

    <div class="start-overlay" id="startOverlay" onclick="startCamera()">
      <div class="start-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      </div>
      <div class="start-label">Tap to start camera</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="statusText">Ready to scan</span>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="result-label">Message revealed</div>
    <div class="result-text" id="resultText"></div>
    <div class="result-actions">
      <button class="btn-copy" onclick="copyText()">Copy text</button>
      <button class="btn-scan-again" onclick="scanAgain()">Scan again</button>
    </div>
  </div>
</div>

<!-- iOS install tip (shown only on iOS Safari, not in standalone) -->
<div class="install-tip" id="installTip">
  <button class="close-tip" onclick="document.getElementById('installTip').style.display='none'">×</button>
  <strong>Add to Home Screen</strong><br>
  Tap the <strong>Share</strong> button in Safari → <strong>Add to Home Screen</strong> to install this as an app.
</div>

<div class="copied-toast" id="toast">Copied to clipboard</div>

<script>
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  }

  // Show iOS install tip if on Safari and not already installed
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  if (isIOS && !isStandalone) {
    document.getElementById('installTip').style.display = 'block';
  }

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');
  const resultPanel = document.getElementById('resultPanel');
  const resultText = document.getElementById('resultText');
  const startOverlay = document.getElementById('startOverlay');
  const toast = document.getElementById('toast');

  let scanning = false;
  let animFrame = null;
  let lastResult = '';
  let cooldown = false;

  function setStatus(state, text) {
    dot.className = 'dot ' + state;
    statusText.textContent = text;
  }

  async function startCamera() {
    startOverlay.style.opacity = '0';
    startOverlay.style.pointerEvents = 'none';
    setTimeout(() => startOverlay.style.display = 'none', 300);

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
      });
      video.srcObject = stream;
      await video.play();
      scanning = true;
      setStatus('active', 'Scanning…');
      tick();
    } catch (e) {
      setStatus('error', 'Camera access denied');
      startOverlay.style.display = 'flex';
      startOverlay.style.opacity = '1';
      startOverlay.style.pointerEvents = 'auto';
      startOverlay.querySelector('.start-label').textContent = 'Tap to retry';
    }
  }

  function tick() {
    if (!scanning) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert'
      });
      if (code && code.data && !cooldown) {
        const text = code.data.trim();
        if (text && text !== lastResult) {
          lastResult = text;
          showResult(text);
          return;
        }
      }
    }
    animFrame = requestAnimationFrame(tick);
  }

  function showResult(text) {
    cooldown = true;
    scanning = false;
    cancelAnimationFrame(animFrame);
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.enabled = false);
    }
    // Haptic feedback on iPhone
    if (navigator.vibrate) navigator.vibrate(40);

    resultText.textContent = text;
    resultPanel.classList.add('visible');
    setStatus('success', 'QR code found');
  }

  function copyText() {
    const text = resultText.textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(showToast).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }
    function fallbackCopy() {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast();
    }
    function showToast() {
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  }

  function scanAgain() {
    lastResult = '';
    cooldown = false;
    resultPanel.classList.remove('visible');
    resultText.textContent = '';
    setStatus('active', 'Scanning…');
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.enabled = true);
    }
    scanning = true;
    tick();
  }
</script>
</body>
</html>
